name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      # Utilisé par les routes /api/cron/*
      CRON_SECRET: test-cron-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local (and reset DB)
        run: supabase start && supabase db reset --local

      - run: npx playwright install --with-deps

      - name: npm run build
        run: |
          # On exporte les variables Supabase local nécessaires au build Next.js.
          supabase status -o env | node -e "
            let buf = '';
            process.stdin.setEncoding('utf8');
            process.stdin.on('data', (d) => (buf += d));
            process.stdin.on('end', () => {
              for (const rawLine of buf.split(/\r?\n/)) {
                const line = rawLine.trim();
                if (!line) continue;
                if (line.startsWith('Stopped services:')) continue;
                const eqIdx = line.indexOf('=');
                if (eqIdx <= 0) continue;
                const key = line.slice(0, eqIdx);
                let value = line.slice(eqIdx + 1);
                if (value.startsWith('\"') && value.endsWith('\"')) value = value.slice(1, -1);
                process.stdout.write(`${key}=${value}\n`);
              }
            });
          " > /tmp/supabase.env

          set -a
          . /tmp/supabase.env
          set +a

          export NEXT_PUBLIC_SUPABASE_URL="${API_URL:-http://127.0.0.1:54321}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY:-}"
          export SUPABASE_SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY:-}"

          npm run build

      - run: npm run test:e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
