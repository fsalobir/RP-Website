name: CI

on:
  push:
    branches: [main, fantasy]
  pull_request:
    branches: [main, fantasy]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

  integration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Reset DB (migrations + seed)
        run: supabase db reset --local

      - name: Export Supabase local env
        run: |
          supabase status -o env | grep -v '^Stopped services:' >> "$GITHUB_ENV"

      - name: Start Edge Function (process-ai-events-due)
        run: |
          nohup supabase functions serve process-ai-events-due --no-verify-jwt > /tmp/supabase-functions.log 2>&1 &

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}

      - name: Start Next.js (background)
        run: |
          nohup npm run start -- -p 3000 > /tmp/next.log 2>&1 &
        env:
          PORT: "3000"
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          CRON_SECRET: "test-cron-secret"

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:3000/" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Next.js did not become ready. Logs:"
          tail -n 200 /tmp/next.log || true
          exit 1

      - name: Run Playwright E2E
        run: npm run test:e2e:run
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

